<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Private site</title>

    <style>
        body {
            margin: 0;
            font-family: "Calibri", sans-serif;

            background: url("https://d.furaffinity.net/art/saneki/1775528885/1775528885.saneki_photo_5318987134473987859_y.jpg") no-repeat center center fixed;
            background-size: cover;

            color: #fff;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: -1;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 50px 20px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-left: 20px;
            box-shadow: 0 0 12px rgba(0,0,0,0.12);
            background-size: cover;
            background-position: center;
            background-image: url("https://i.pinimg.com/736x/fb/6f/5b/fb6f5bed9ba8805a982830cc34d8533a.jpg");
        }

        h1 {
            margin: 0;
            font-size: 36px;
            color: white;
        }

        h2, p, a {
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .block {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);

            padding: 20px 25px;
            border-radius: 15px;
            margin-bottom: 30px;

            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .social a {
            display: inline-block;
            margin-right: 15px;
            text-decoration: none;
            color: #ffffff;
            opacity: 0.9;
            font-weight: bold;
        }

        .social a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 20px;
            opacity: 0.6;
        }

        /* slider */
        .characters {
            position: relative;
            overflow: hidden;
            width: 100%;
            margin-top: 20px;
        }

        .slider {
            display: flex;
            gap: 20px;
            transition: transform 0.4s ease;
        }

        .card {
            min-width: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card p {
            margin-top: 10px;
            font-weight: bold;
        }

        .nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
        }

        .prev { left: -10px; }
        .next { right: -10px; }

        .nav:hover {
            background: rgba(0,0,0,0.7);
        }
    </style>
</head>

<body>

<header>
    <div>
        <h1>Neki</h1>
    </div>
    <div class="avatar"></div>
</header>

<div class="container">

    <div class="block">
        <h2>About me</h2>
        <p>
        Silly Avali | DevOps enthusiast | Artist and Game dev | Shy but eager to learn | Spreading positivity trough hugs | Average tea enjoyer
        </p>
    </div>

    <div class="block">
        <h2>Socials</h2>
        <div class="social">
            <a href="https://t.me/ISanekiI/path">Telegram</a>
            <a href="https://discord.com/channels/@__neki__">Discord</a>
            <a href="https://www.reddit.com/user/Christopher3422">Reddit</a>
            <a href="https://steamcommunity.com/id/Neki2/">Steam</a>
            <a href="https://www.furaffinity.net/user/saneki">FurAffinity</a>
            <a href="https://github.com/Saneki1">GitHub</a>
            <a href="https://pin.it/3Xr5GNsed">Pinterest</a>
        </div>
    </div>

    <div class="block">
        <h2>Characters</h2>

        <div class="characters">
            <button class="nav prev">◀</button>

            <div class="slider">
                <div class="card">
                    <img src="https://i.pinimg.com/736x/8d/30/04/8d3004c08a94d8fb1272ba3fa922b1da.jpg">
                    <p>Neki</p>
                </div>

                <div class="card">
                    <img src="https://i.pinimg.com/736x/2e/75/4e/2e754e89995cf400cbbb5319ef350171.jpg">
                    <p>Marshmallow</p>
                </div>

                <div class="card">
                    <img src="https://i.pinimg.com/736x/53/61/69/536169a67a26bcc088d352d72e4bad56.jpg">
                    <p>Christopher</p>
                </div>

                <div class="card">
                    <img src="https://i.pinimg.com/736x/ed/f7/eb/edf7eb15501f11b362a375cdd2f19cf3.jpg">
                    <p>idk</p>
                </div>

                <div class="card">
                    <img src="https://i.pinimg.com/736x/c5/56/0a/c5560a5571a74ad26c8ca2d8e8aaff2f.jpg">
                    <p>idk</p>
                </div>

                <div class="card">
                    <img src="https://i.pinimg.com/736x/87/9a/40/879a40f887fd7d000aee0a5c1729082c.jpg">
                    <p>idk</p>
                </div>
            </div>

            <button class="nav next">▶</button>
        </div>
    </div>

</div>

<footer>
    © 2025 IISanekiII
</footer>

<script>
let index = 0;
const slider = document.querySelector(".slider");
const cards = document.querySelectorAll(".card");

document.querySelector(".next").onclick = () => {
    index++;
    if (index > cards.length - 3) index = 0;
    slider.style.transform = `translateX(-${index * 220}px)`;
};

document.querySelector(".prev").onclick = () => {
    index--;
    if (index < 0) index = cards.length - 3;
    slider.style.transform = `translateX(-${index * 220}px)`;
};
</script>

</body>
</html>
